<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Roam Wild — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--ember:#E8531A;--ember-dark:#C43D0E;--ember-light:#FBE9E2;--night:#1A1A18;--canvas:#F9F7F3;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--night);color:#fff;min-height:100vh;display:flex;flex-direction:column;}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(135deg,#1A1A18 0%,#2E2E2A 100%);}
.logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.logo-icon{width:52px;height:52px;background:var(--ember);border-radius:14px;display:flex;align-items:center;justify-content:center;}
.logo-word{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;color:#fff;}
.tagline{font-size:14px;color:rgba(255,255,255,0.4);margin-bottom:40px;letter-spacing:1px;text-transform:uppercase;}
.card{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:380px;color:var(--night);}
.tabs{display:flex;gap:0;margin-bottom:24px;background:var(--canvas);border-radius:10px;padding:3px;}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;transition:all 0.15s;color:#888;}
.tab.active{background:#fff;color:var(--night);box-shadow:0 1px 4px rgba(0,0,0,0.08);}
.form-group{margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:500;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
input{width:100%;padding:11px 14px;border:1px solid rgba(26,26,24,0.12);border-radius:10px;font-size:14px;color:var(--night);font-family:'DM Sans',sans-serif;outline:none;background:var(--canvas);}
input:focus{border-color:var(--ember);background:#fff;}
.btn-primary{width:100%;padding:13px;background:var(--ember);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;transition:background 0.15s;}
.btn-primary:hover{background:var(--ember-dark);}
.btn-primary:disabled{background:#ccc;cursor:not-allowed;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#ccc;font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(26,26,24,0.1);}
.social-btn{width:100%;padding:11px;border:1px solid rgba(26,26,24,0.12);border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;background:#fff;color:var(--night);display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:all 0.15s;}
.social-btn:hover{border-color:var(--ember);background:var(--ember-light);}
.msg{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:16px;display:none;}
.msg.error{background:#FCEBEB;color:#C43D0E;display:block;}
.msg.success{background:#E1F5EE;color:#085041;display:block;}
.msg.info{background:#E6F1FB;color:#185FA5;display:block;}
.back-link{color:rgba(255,255,255,0.4);font-size:12px;margin-top:20px;text-decoration:none;display:flex;align-items:center;gap:6px;}
.back-link:hover{color:rgba(255,255,255,0.7);}
.user-panel{display:none;background:#fff;border-radius:20px;padding:32px;width:100%;max-width:380px;color:var(--night);text-align:center;}
.avatar{width:72px;height:72px;background:var(--ember);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;}
.user-name{font-size:20px;font-weight:500;margin-bottom:4px;}
.user-email{font-size:12px;color:#888;margin-bottom:24px;}
.stat-row{display:flex;gap:16px;margin-bottom:24px;}
.stat-box{flex:1;background:var(--canvas);border-radius:10px;padding:12px;text-align:center;}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--ember);}
.stat-l{font-size:10px;color:#888;}
.btn-secondary{width:100%;padding:11px;border:1px solid rgba(26,26,24,0.12);border-radius:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;background:#fff;color:var(--night);margin-bottom:10px;}
.btn-signout{width:100%;padding:11px;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;background:#FCEBEB;color:#C43D0E;font-weight:500;}
</style>
</head>
<body>
<div class="hero">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="28" height="28" viewBox="0 0 22 22" fill="none">
        <path d="M3 16 Q8 8 11 12 Q14 8 19 4" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="19" cy="4" r="2.5" fill="white"/>
        <circle cx="3" cy="16" r="1.8" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <span class="logo-word">Roam Wild</span>
  </div>
  <div class="tagline">Go Further</div>

  <!-- AUTH CARD -->
  <div class="card" id="auth-card">
    <div class="tabs">
      <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <div id="msg" class="msg"></div>

    <!-- SIGN IN FORM -->
    <div id="form-signin">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="si-email" placeholder="you@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="si-pass" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" onclick="signIn()">Sign In →</button>
      <div class="divider">or</div>
      <button class="social-btn" onclick="signInGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <button class="social-btn" onclick="signInApple()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Continue with Apple
      </button>
    </div>

    <!-- SIGN UP FORM -->
    <div id="form-signup" style="display:none;">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="su-username" placeholder="adventurer_123"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="su-email" placeholder="you@email.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="su-pass" placeholder="Min 6 characters"/>
      </div>
      <div class="form-group">
        <label>Favourite Activity</label>
        <input type="text" id="su-activity" placeholder="e.g. Gold fossicking, MTB, Surfing"/>
      </div>
      <button class="btn-primary" onclick="signUp()">Create Account →</button>
    </div>
  </div>

  <!-- USER PANEL (shown when logged in) -->
  <div class="user-panel" id="user-panel">
    <div class="avatar" id="user-avatar">🧭</div>
    <div class="user-name" id="user-name">Loading...</div>
    <div class="user-email" id="user-email"></div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-n" id="stat-saved">0</div><div class="stat-l">Saved</div></div>
      <div class="stat-box"><div class="stat-n" id="stat-added">0</div><div class="stat-l">Added</div></div>
      <div class="stat-box"><div class="stat-n" id="stat-reviews">0</div><div class="stat-l">Reviews</div></div>
    </div>
    <button class="btn-secondary" onclick="window.location.href='https://roam-wild-beta.vercel.app'">🗺️ Open Map</button>
    <button class="btn-signout" onclick="signOut()">Sign Out</button>
  </div>

  <a href="https://roam-wild-beta.vercel.app" class="back-link">← Back to Roam Wild</a>
</div>

<script>
const SUPABASE_URL = 'https://zqkujliskbvexoxtnjxv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxa3VqbGlza2J2ZXhveHRuanh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjc1ODksImV4cCI6MjA5MTg0MzU4OX0.m8c50IQBVsPFLOFFRDEbhiZWy6nVGSI0qK-DWhqMmdI';

function showMsg(text, type='error'){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type}`;
}

function hideMsg(){
  document.getElementById('msg').className = 'msg';
}

function switchTab(tab){
  document.getElementById('tab-signin').className = 'tab' + (tab==='signin'?' active':'');
  document.getElementById('tab-signup').className = 'tab' + (tab==='signup'?' active':'');
  document.getElementById('form-signin').style.display = tab==='signin'?'block':'none';
  document.getElementById('form-signup').style.display = tab==='signup'?'block':'none';
  hideMsg();
}

async function signIn(){
  const email = document.getElementById('si-email').value.trim();
  const pass = document.getElementById('si-pass').value;
  if(!email||!pass){showMsg('Please fill in all fields');return;}
  
  const btn = document.querySelector('#form-signin .btn-primary');
  btn.disabled = true; btn.textContent = 'Signing in...';
  
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: {'apikey': SUPABASE_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({email, password: pass})
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error_description || data.error);
    
    localStorage.setItem('rw_token', data.access_token);
    localStorage.setItem('rw_user', JSON.stringify(data.user));
    showMsg('Signed in! Welcome back 🎉', 'success');
    setTimeout(()=>showUserPanel(data.user), 800);
  } catch(err){
    showMsg(err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In →';
  }
}

async function signUp(){
  const username = document.getElementById('su-username').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const pass = document.getElementById('su-pass').value;
  const activity = document.getElementById('su-activity').value.trim();
  
  if(!username||!email||!pass){showMsg('Please fill in all required fields');return;}
  if(pass.length < 6){showMsg('Password must be at least 6 characters');return;}
  
  const btn = document.querySelector('#form-signup .btn-primary');
  btn.disabled = true; btn.textContent = 'Creating account...';
  
  try {
    // Sign up with Supabase Auth
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: {'apikey': SUPABASE_KEY, 'Content-Type': 'application/json'},
      body: JSON.stringify({email, password: pass, data: {username, favourite_activity: activity}})
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error_description || data.error);
    
    // Create profile
    if(data.user) {
      await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${data.access_token}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          id: data.user.id,
          username,
          full_name: username,
          favourite_activity: activity
        })
      });
      
      localStorage.setItem('rw_token', data.access_token);
      localStorage.setItem('rw_user', JSON.stringify(data.user));
      showMsg('Account created! Welcome to Roam Wild 🎉', 'success');
      setTimeout(()=>showUserPanel(data.user, username), 800);
    }
  } catch(err){
    showMsg(err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account →';
  }
}

function signInGoogle(){
  showMsg('Google login coming soon! Use email for now.', 'info');
}

function signInApple(){
  showMsg('Apple login coming soon! Use email for now.', 'info');
}

async function signOut(){
  const token = localStorage.getItem('rw_token');
  if(token){
    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: 'POST',
      headers: {'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`}
    });
  }
  localStorage.removeItem('rw_token');
  localStorage.removeItem('rw_user');
  document.getElementById('user-panel').style.display = 'none';
  document.getElementById('auth-card').style.display = 'block';
}

function showUserPanel(user, username){
  document.getElementById('auth-card').style.display = 'none';
  const panel = document.getElementById('user-panel');
  panel.style.display = 'block';
  
  const name = username || user.user_metadata?.username || user.email.split('@')[0];
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('user-avatar').textContent = name[0].toUpperCase();
}

// Check if already logged in
window.addEventListener('load', ()=>{
  const token = localStorage.getItem('rw_token');
  const user = localStorage.getItem('rw_user');
  if(token && user){
    try { showUserPanel(JSON.parse(user)); } catch(e){}
  }
});
</script>
</body>
</html>
